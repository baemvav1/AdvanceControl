name: Publicar instalador cliente

on:
  push:
    branches:
      - main
    paths:
      - "Advance Control/**"
      - "build/**"
      - ".github/workflows/publish-client-installer.yml"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-client-installer:
    runs-on: windows-latest

    env:
      SOLUTION_PATH: Advance Control.sln
      PROJECT_PATH: Advance Control/Advance Control.csproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Configurar MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Calcular version del paquete
        id: version
        shell: pwsh
        run: |
          $baseDate = [datetime]'2024-01-01T00:00:00Z'
          $daysSinceBase = [int]([datetime]::UtcNow - $baseDate).TotalDays
          $revision = ([int]${{ github.run_number }} * 10) + [int]${{ github.run_attempt }}
          if ($revision -gt 65535) {
            $revision = $revision % 65535
          }
          $version = "1.0.$daysSinceBase.$revision"
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Version calculada: $version"

      - name: Restaurar
        run: dotnet restore "${{ env.SOLUTION_PATH }}" -p:Platform=x64 -p:PublishReadyToRun=false -p:PublishTrimmed=false

      - name: Compilar
        run: dotnet build "${{ env.SOLUTION_PATH }}" -c Release -p:Platform=x64 -p:PublishReadyToRun=false -p:PublishTrimmed=false --no-restore -nologo

      - name: Probar
        run: dotnet test "${{ env.SOLUTION_PATH }}" -c Release -p:Platform=x64 -p:PublishReadyToRun=false -p:PublishTrimmed=false --no-build --verbosity minimal -nologo

      - name: Materializar certificado de firma
        id: cert
        shell: pwsh
        env:
          WINDOWS_PFX_BASE64: ${{ secrets.WINDOWS_PFX_BASE64 }}
          WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_PFX_BASE64)) {
            throw 'Falta el secreto WINDOWS_PFX_BASE64.'
          }

          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_PFX_PASSWORD)) {
            throw 'Falta el secreto WINDOWS_PFX_PASSWORD.'
          }

          $certPath = Join-Path $env:RUNNER_TEMP 'advance-control-signing.pfx'
          [System.IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_PFX_BASE64))
          "path=$certPath" >> $env:GITHUB_OUTPUT

      - name: Publicar instalador MSIX
        shell: pwsh
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.version }}
          # Servido directo desde el VPS — independiente de GitHub Releases
          APP_INSTALLER_BASE_URI: http://${{ secrets.VPS_HOST }}:5030/client-dist
          CERT_PATH: ${{ steps.cert.outputs.path }}
          CERT_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
        run: |
          .\build\Publish-ClientInstaller.ps1 `
            -ProjectPath "${{ env.PROJECT_PATH }}" `
            -Configuration Release `
            -Platform x64 `
            -Version $env:PACKAGE_VERSION `
            -AppInstallerBaseUri $env:APP_INSTALLER_BASE_URI `
            -OutputDirectory ".\artifacts\installer" `
            -CertificatePath $env:CERT_PATH `
            -CertificatePassword $env:CERT_PASSWORD

      - name: Generar version.json
        shell: pwsh
        run: |
          @{ version = "${{ steps.version.outputs.version }}" } |
            ConvertTo-Json -Compress |
            Set-Content -Encoding UTF8 artifacts/installer/version.json

      - name: Subir MSIX, version.json y AppInstaller al VPS
        shell: pwsh
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          # appleboy/scp-action es una Docker container action: GitHub no permite
          # correr acciones Docker en runners Windows, solo Linux. Este job corre
          # en windows-latest (obligatorio para MSBuild/MSIX), asi que usamos el
          # cliente scp nativo de OpenSSH que ya viene instalado en el runner.
          $keyPath = Join-Path $env:RUNNER_TEMP 'vps_deploy_key'
          [System.IO.File]::WriteAllText($keyPath, $env:VPS_SSH_KEY, [System.Text.Encoding]::ASCII)
          icacls $keyPath /inheritance:r | Out-Null
          icacls $keyPath /grant:r "$($env:USERNAME):(R)" | Out-Null

          $files = @(
            'artifacts\installer\AdvanceControl-x64.msix',
            'artifacts\installer\version.json',
            'artifacts\installer\AdvanceControl.appinstaller'
          )

          foreach ($file in $files) {
            & scp -o StrictHostKeyChecking=no -i $keyPath $file "${env:VPS_USER}@${env:VPS_HOST}:/opt/advanceapi/storage/client-dist/"
            if ($LASTEXITCODE -ne 0) {
              throw "scp fallo para '$file' (exit code $LASTEXITCODE)"
            }
          }

          Remove-Item $keyPath -Force

      - name: Publicar artefactos del workflow
        uses: actions/upload-artifact@v4
        with:
          name: cliente-instalador-${{ steps.version.outputs.version }}
          path: |
            artifacts/installer/AdvanceControl.appinstaller
            artifacts/installer/AdvanceControl-x64.msix

      # Release 'client-latest': tag estable que AppInstaller usa para la URL de auto-actualización.
      # Se recrea en cada build para que la URL no cambie nunca (sin redirects).
      - name: Actualizar release de auto-actualización (client-latest)
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Eliminar release y tag anterior si existen
          gh release delete client-latest --yes 2>$null
          git tag -f client-latest
          git push -f origin client-latest
          # Crear nuevo release con los archivos MSIX
          gh release create client-latest `
            --title "Ultima version del cliente" `
            --notes "Version actual: v$env:PACKAGE_VERSION" `
            --latest `
            "artifacts\installer\AdvanceControl.appinstaller" `
            "artifacts\installer\AdvanceControl-x64.msix"

      # Release versionado: historial de versiones (no es el que usa AppInstaller)
      - name: Crear release versionado (historial)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: client-v${{ steps.version.outputs.version }}
          name: Cliente v${{ steps.version.outputs.version }}
          generate_release_notes: true
          make_latest: false
          files: |
            artifacts/installer/AdvanceControl.appinstaller
            artifacts/installer/AdvanceControl-x64.msix
